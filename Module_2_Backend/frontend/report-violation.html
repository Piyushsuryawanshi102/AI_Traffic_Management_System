<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/common.css">
 <link rel="stylesheet" href="assets/css/report-violation.css">

    <title>Report Violation - Officer</title>
</head>
<body>
    <body data-protected="true">

    <h1>Report Violation</h1>
    <button onclick="logout()">Logout</button>
    <form id="violationForm">
        <input type="text" id="plate" placeholder="Vehicle Plate" required><br>
        <input type="text" id="type" placeholder="Violation Type" required><br>
        <input type="text" id="evidence" placeholder="Evidence URL" required><br>
        <input type="number" step="0.01" id="confidence" placeholder="Confidence Score" required><br>
        <input type="text" id="camera" placeholder="Camera ID"><br>
        <button type="submit">Submit Violation</button>
    </form>

    <script>
        const token = localStorage.getItem('token');
        if(!token) location.href='login.html';
        function logout(){ localStorage.removeItem('token'); location.href='login.html'; }

        document.getElementById('violationForm').addEventListener('submit', async e=>{
            e.preventDefault();
            const payload = {
                plate_number: document.getElementById('plate').value,
                violation_type: document.getElementById('type').value,
                evidence_image_url: document.getElementById('evidence').value,
                confidence_score: parseFloat(document.getElementById('confidence').value),
                camera_id: document.getElementById('camera').value || null
            };
            try{
                const res = await fetch('http://127.0.0.1:8000/violations/',{
                    method:'POST',
                    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                alert(JSON.stringify(data));
            } catch(err){ alert(err); }
        });
    </script>
</body>
</html>
