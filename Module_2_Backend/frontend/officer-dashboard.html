<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer Dashboard - Bhopal Traffic</title>
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/officer-dashboard.css">
    <link rel="stylesheet" href="assets/css/report-violation.css">
    <link rel="stylesheet" href="assets/css/report-accident.css">
    <link rel="stylesheet" href="assets/css/upload-video.css">
    <link rel="stylesheet" href="assets/css/camera-feed.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Auth + API -->
    <script src="js/auth.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color:#f2f4f7; margin:20px; }
        h1, h2, h3 { color:#003366; }
        button { background-color:#003366; color:white; padding:6px 12px; border:none; cursor:pointer; margin:5px 0; }
        button:hover { background-color:#0055a5; }
        table { width:100%; border-collapse:collapse; margin-bottom:20px; background-color:white; }
        th, td { padding:8px; text-align:center; border:1px solid #ccc; }
        th { background-color:#003366; color:white; }
        input, select, textarea { width:100%; padding:6px; margin:4px 0; }
        form { background-color:white; padding:10px; margin-bottom:20px; border:1px solid #ccc; }
        #camerasContainer { text-align:center; margin-bottom:20px; }
        #liveCamera { border:2px solid #003366; border-radius:4px; }
    </style>
</head>
<body data-protected="true">

<h1>Officer Dashboard - Bhopal Traffic Management</h1>
<button id="logoutBtn">Logout</button>

<hr>

<h2>Violations</h2>
<button onclick="loadOfficerDashboard()">Refresh Violations</button>
<table>
    <thead>
        <tr>
            <th>Plate</th>
            <th>Type</th>
            <th>Confidence</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="violationsTableBody"></tbody>
</table>

<h3>Daily Violations Chart</h3>
<canvas id="violationsChart" width="600" height="250"></canvas>

<hr>

<h2>Upload Video</h2>
<form>
    <input type="file" id="videoFile">
    <button type="button" onclick="uploadVideo()">Upload</button>
</form>

<hr>

<h2>Live Camera Feed</h2>
<div id="camerasContainer">
    <img id="liveCamera" src="http://127.0.0.1:8000/cameras/live?camera_id=0" 
         width="640" height="480" alt="Live Camera Feed">
</div>

<hr>

<h2>Report Accident</h2>
<form id="accidentForm">
    <input type="text" name="location" placeholder="Location"><br>
    <select name="severity">
        <option value="">Select Severity</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select><br>
    <textarea name="description" placeholder="Description"></textarea><br>
    <button type="submit">Report</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Auto-reload live camera feed every 30s to prevent freeze
    const liveCam = document.getElementById("liveCamera");
    setInterval(() => {
        liveCam.src = "http://127.0.0.1:8000/cameras/live?camera_id=0&rand=" + Date.now();
    }, 30000);
});
</script>

</body>
</html>
