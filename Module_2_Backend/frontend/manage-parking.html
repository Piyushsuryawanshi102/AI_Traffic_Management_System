<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/common.css">
 <link rel="stylesheet" href="assets/css/manage-parking.css">

    <title>Manage Parking - Admin</title>
</head>
<body>
    <body data-protected="true">

    <h1>Manage Parking</h1>
    <button onclick="logout()">Logout</button>

    <h2>Create Parking Lot</h2>
    <form id="parkingForm">
        <input type="text" id="name" placeholder="Name" required><br>
        <input type="text" id="location" placeholder="Location" required><br>
        <input type="number" id="total" placeholder="Total Capacity" required><br>
        <input type="number" id="available" placeholder="Available Slots" required><br>
        <button type="submit">Create</button>
    </form>

    <h2>Existing Parking</h2>
    <button onclick="fetchParking()">Refresh</button>
    <table border="1" id="parkingTable">
        <tr><th>Name</th><th>Location</th><th>Total</th><th>Available</th></tr>
    </table>

    <script>
        const token = localStorage.getItem('token');
        if(!token) location.href='login.html';
        function logout(){ localStorage.removeItem('token'); location.href='login.html'; }

        document.getElementById('parkingForm').addEventListener('submit', async e=>{
            e.preventDefault();
            const payload={
                name: document.getElementById('name').value,
                area: document.getElementById('location').value,
                total_capacity: parseInt(document.getElementById('total').value),
                occupied: parseInt(document.getElementById('total').value) - parseInt(document.getElementById('available').value)
            };
            try{
                const res = await fetch('http://127.0.0.1:8000/parking/',{
                    method:'POST',
                    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                alert(JSON.stringify(data));
                fetchParking();
            } catch(err){ alert(err); }
        });

        async function fetchParking(){
            const res = await fetch('http://127.0.0.1:8000/parking/',{
                headers:{'Authorization':'Bearer '+token}
            });
            const data = await res.json();
            const table = document.getElementById('parkingTable');
            table.innerHTML='<tr><th>Name</th><th>Location</th><th>Total</th><th>Available</th></tr>';
            data.forEach(p=>{
                const row = table.insertRow();
                row.insertCell(0).innerText=p.name;
                row.insertCell(1).innerText=p.area;
                row.insertCell(2).innerText=p.total_capacity;
                row.insertCell(3).innerText=p.total_capacity - p.occupied;
            });
        }
        fetchParking();
    </script>
</body>
</html>
