<!DOCTYPE html>
<html lang="en">
<head>
   

    <meta charset="UTF-8">

 <link rel="stylesheet" href="assets/css/common.css">

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="assets/css/admin-dashboard.css">
    <link rel="stylesheet" href="assets/css/common.css">
 <link rel="stylesheet" href="assets/css/manage-parking.css">
 <link rel="stylesheet" href="assets/css/view-payments.css">

    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/auth.js"></script>
</head>
<body data-protected="true">

<h1>Admin Dashboard</h1>
<button id="logoutBtn">Logout</button>

<h2>Manage Parking</h2>
<form id="parkingForm">
    <input type="text" name="name" placeholder="Parking Name"><br>
    <input type="text" name="location" placeholder="Location"><br>
    <input type="number" name="total_slots" placeholder="Total Slots"><br>
    <input type="number" name="available_slots" placeholder="Available Slots"><br>
    <button type="submit">Save</button>
</form>

<h3>Parking Lots</h3>
<canvas id="parkingChart" width="600" height="250"></canvas>
<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Total Slots</th>
            <th>Available Slots</th>
        </tr>
    </thead>
    <tbody id="parkingTableBody"></tbody>
</table>

<h3>Payments</h3>
<table border="1">
    <thead>
        <tr>
            <th>Challan ID</th>
            <th>Vehicle</th>
            <th>Amount</th>
            <th>Payment Method</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="paymentsTableBody"></tbody>
</table>

</body>
</html>
