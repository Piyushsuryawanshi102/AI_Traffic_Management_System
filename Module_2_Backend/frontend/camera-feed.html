<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/common.css">
 <link rel="stylesheet" href="assets/css/camera-feed.css">

    <title>Live Camera Feed</title>
</head>
<body>
    <body data-protected="true">

    <h1>Live Camera Feed</h1>
    <button onclick="logout()">Logout</button>
    <input type="text" id="cameraId" placeholder="Camera ID"><br>
    <img id="liveFeed" width="640">

    <script>
        const token = localStorage.getItem('token');
        if(!token) location.href='login.html';
        function logout(){ localStorage.removeItem('token'); location.href='login.html'; }

        const cameraInput = document.getElementById('cameraId');
        const img = document.getElementById('liveFeed');

        cameraInput.addEventListener('input', ()=>{
            img.src=`http://127.0.0.1:8000/cameras/live?camera_id=${cameraInput.value}`;
        });
    </script>
</body>
</html>
