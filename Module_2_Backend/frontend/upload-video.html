<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/common.css">
 <link rel="stylesheet" href="assets/css/upload-video.css">

    <title>Upload Video - Officer</title>
</head>
<body>
    <body data-protected="true">

    <h1>Upload Traffic Video</h1>
    <button onclick="logout()">Logout</button>
    <input type="file" id="videoFile">
    <button onclick="uploadVideo()">Upload</button>

    <script>
        const token = localStorage.getItem('token');
        if(!token) location.href='login.html';
        function logout(){ localStorage.removeItem('token'); location.href='login.html'; }

        async function uploadVideo(){
            const file = document.getElementById('videoFile').files[0];
            if(!file) return alert('Select a file');
            const formData = new FormData();
            formData.append('video', file);
            try{
                const res = await fetch('http://127.0.0.1:8000/cameras/upload',{
                    method:'POST',
                    headers:{'Authorization':'Bearer '+token},
                    body: formData
                });
                const data = await res.json();
                alert(JSON.stringify(data));
            } catch(err){ alert(err); }
        }
    </script>
</body>
</html>
